<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDEE Calculator | Mifflin-St Jeor</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .calc-card {
            background: var(--card);
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        h1 { margin: 0 0 0.5rem 0; font-size: 1.75rem; text-align: center; color: var(--primary-dark); }
        p.desc { text-align: center; color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem; }

        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.85rem; }

        /* Toggle Switches */
        .toggle-container {
            display: flex;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .toggle-btn {
            flex: 1;
            border: none;
            padding: 10px;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            background: transparent;
            color: var(--text-muted);
            transition: 0.2s;
        }
        .toggle-btn.active {
            background: white;
            color: var(--primary-dark);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .height-row { display: flex; gap: 10px; }

        #calc-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
            transition: background 0.2s;
        }
        #calc-btn:hover { background: var(--primary-dark); }

        /* Results Section */
        #results-area {
            margin-top: 2rem;
            display: none;
            border-top: 2px solid #f1f5f9;
            padding-top: 2rem;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .tdee-box {
            text-align: center;
            background: #eef2ff;
            padding: 1.5rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
        }
        .tdee-val { font-size: 2.5rem; font-weight: 800; color: var(--primary-dark); display: block; }
        .tdee-label { text-transform: uppercase; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-card {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 0.75rem;
            text-align: center;
            border: 1px solid #f1f5f9;
        }
        .stat-val { display: block; font-weight: 700; font-size: 1.1rem; }
        .stat-label { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="calc-card">
    <h1>TDEE Calculator</h1>
    <p class="desc">Mifflin-St Jeor Equation</p>

    <!-- Unit Selection -->
    <div class="toggle-container">
        <button class="toggle-btn active" onclick="switchUnit('metric', this)">Metric (kg/cm)</button>
        <button class="toggle-btn" onclick="switchUnit('imperial', this)">Imperial (lb/ft)</button>
    </div>

    <!-- Gender Selection -->
    <div class="form-group">
        <label>Biological Sex</label>
        <div class="toggle-container">
            <button class="toggle-btn active gender-toggle" onclick="switchGender('male', this)">Male</button>
            <button class="toggle-btn gender-toggle" onclick="switchGender('female', this)">Female</button>
        </div>
    </div>

    <div class="form-group">
        <label for="age">Age</label>
        <input type="number" id="age" placeholder="e.g. 28">
    </div>

    <div class="form-group">
        <label id="weight-label">Weight (kg)</label>
        <input type="number" id="weight" placeholder="e.g. 75">
    </div>

    <!-- Height Metric -->
    <div class="form-group" id="height-metric-group">
        <label>Height (cm)</label>
        <input type="number" id="cm" placeholder="e.g. 180">
    </div>

    <!-- Height Imperial -->
    <div class="form-group hidden" id="height-imperial-group">
        <label>Height</label>
        <div class="height-row">
            <input type="number" id="ft" placeholder="ft">
            <input type="number" id="in" placeholder="in">
        </div>
    </div>

    <div class="form-group">
        <label>Activity Level</label>
        <select id="activity">
            <option value="1.2">Sedentary (Little to no exercise)</option>
            <option value="1.375">Lightly Active (Exercise 1-3 days/week)</option>
            <option value="1.55">Moderately Active (Exercise 3-5 days/week)</option>
            <option value="1.725">Very Active (Exercise 6-7 days/week)</option>
            <option value="1.9">Extra Active (Hard physical job/2x training)</option>
        </select>
    </div>

    <button id="calc-btn" onclick="calculate()">Calculate Now</button>

    <!-- Result Display -->
    <div id="results-area">
        <div class="tdee-box">
            <span class="tdee-label">Maintenance Calories (TDEE)</span>
            <span class="tdee-val" id="res-tdee">0</span>
            <small>calories per day</small>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">BMR</span>
                <span class="stat-val" id="res-bmr">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Cutting (-500)</span>
                <span class="stat-val" style="color: #ef4444;" id="res-cut">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Bulking (+500)</span>
                <span class="stat-val" style="color: #10b981;" id="res-bulk">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Weekly TDEE</span>
                <span class="stat-val" id="res-week">0</span>
            </div>
        </div>
    </div>
</div>

<script>
    let unit = 'metric';
    let gender = 'male';

    function switchUnit(val, btn) {
        unit = val;
        // UI toggle
        btn.parentNode.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Field toggle
        document.getElementById('weight-label').innerText = val === 'metric' ? 'Weight (kg)' : 'Weight (lbs)';
        document.getElementById('height-metric-group').classList.toggle('hidden', val === 'imperial');
        document.getElementById('height-imperial-group').classList.toggle('hidden', val === 'metric');
    }

    function switchGender(val, btn) {
        gender = val;
        document.querySelectorAll('.gender-toggle').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function calculate() {
        const age = parseFloat(document.getElementById('age').value);
        let weight = parseFloat(document.getElementById('weight').value);
        let height;

        if (!age || !weight) return alert("Please fill in all values.");

        // Convert to Metric if Imperial
        if (unit === 'imperial') {
            const ft = parseFloat(document.getElementById('ft').value) || 0;
            const inch = parseFloat(document.getElementById('in').value) || 0;
            weight = weight * 0.453592; // lbs to kg
            height = (ft * 30.48) + (inch * 2.54); // ft/in to cm
        } else {
            height = parseFloat(document.getElementById('cm').value);
        }

        if (!height) return alert("Please enter height.");

        /** 
         * MIFFLIN-ST JEOR FORMULA 
         */
        let bmr;
        if (gender === 'male') {
            bmr = (10 * weight) + (6.25 * height) - (5 * age) + 5;
        } else {
            bmr = (10 * weight) + (6.25 * height) - (5 * age) - 161;
        }

        const activity = parseFloat(document.getElementById('activity').value);
        const tdee = bmr * activity;

        // Display results
        document.getElementById('results-area').style.display = 'block';
        document.getElementById('res-bmr').innerText = Math.round(bmr).toLocaleString();
        document.getElementById('res-tdee').innerText = Math.round(tdee).toLocaleString();
        document.getElementById('res-cut').innerText = Math.round(tdee - 500).toLocaleString();
        document.getElementById('res-bulk').innerText = Math.round(tdee + 500).toLocaleString();
        document.getElementById('res-week').innerText = Math.round(tdee * 7).toLocaleString();

        // Smooth scroll to results
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
